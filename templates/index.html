<html lang="es">

    <title>Sistema de Promedios - GNA</title>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            min-height: 100vh;

        .container {

            border-top: 8px solid #2e4d23; /* Verde Oliva GNA */
        }

            text-align: center;
            color: #2e4d23;

            text-transform: uppercase;
            font-size: 1.2em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {

            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Evita que se salga del cuadro */
        }

            background-color: #2e4d23;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1b3015;
